<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D6336C"/>
      <stop offset="50%" stop-color="#E84393"/>
      <stop offset="100%" stop-color="#F783AC"/>
    </linearGradient>
  </defs>
  <!-- Icon: Rounded square with S -->
  <rect x="10" y="20" width="160" height="160" rx="34" fill="url(#brand)"/>
  <text x="90" y="138" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="110" fill="white">S</text>
  <!-- Wordmark (white for dark backgrounds) -->
  <text x="200" y="138" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="96" fill="#ffffff" letter-spacing="8">SUBASH</text>
</svg>
