name: subash

services:
  # ------------------------------------------
  #  Next.js Web Application (SQLite — no separate DB service)
  # ------------------------------------------
  web:
    image: ghcr.io/redwan99/subash:latest
    container_name: subash_web
    restart: unless-stopped
    hostname: subash_web
    privileged: false
    cpu_shares: 90
    deploy:
      resources:
        limits:
          memory: 1024M
    ports:
      - mode: ingress
        target: 9864
        published: "${APP_PORT:-9864}"
        protocol: tcp
      # Prisma Studio — only active when you run it manually inside the container:
      #   docker exec -it subash_web npx prisma studio --port 5555 --browser none
      # Then open http://<casaos-ip>:5555 in your browser.
      - mode: ingress
        target: 5555
        published: "${PRISMA_STUDIO_PORT:-5555}"
        protocol: tcp
    volumes:
      # SQLite database — persisted on the CasaOS host disk across updates/restarts
      # DATA_DIR defaults to the standard CasaOS path; override in .env if needed.
      - type: bind
        source: ${DATA_DIR:-/DATA/AppData/subash/data}
        target: /app/data
    devices: []
    cap_add: []
    command: []
    networks:
      - default
    environment:
      # --- Database (SQLite) ------------------------------------------
      # Set in .env: DATABASE_URL=file:/app/data/subash.db
      # entrypoint.sh creates the file if missing; Prisma reads this at runtime.
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/subash.db}

      # --- Seeding ----------------------------------------------------
      # Set to "true" on FIRST boot to import all ~70k perfumes (~3-5 min).
      # Set to "false" (or remove) after seeding so restarts are fast.
      SEED_DB: ${SEED_DB:-false}

      # --- Auth -------------------------------------------------------
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}

      # --- OAuth ------------------------------------------------------
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET}

      # --- Turnstile (Cloudflare CAPTCHA) -----------------------------
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}

      # --- App config -------------------------------------------------
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_DEFAULT_CITY: ${NEXT_PUBLIC_DEFAULT_CITY}
      OPENWEATHERMAP_API_KEY: ${OPENWEATHERMAP_API_KEY}

      # --- Firebase ---------------------------------------------------
      NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}

      # --- SMTP (Email) -----------------------------------------------
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}

networks:
  default:
    name: subash_default

# ------------------------------------------
#  CasaOS App Store Metadata
# ------------------------------------------
x-casaos:
  architectures:
    - amd64
    - arm64
  main: web
  scheme: http
  index: /
  hostname: ""
  description:
    en_us: Subash is an open-source clone of Fragrantica/Parfumo, powered by Next.js and SQLite.
  tagline:
    en_us: Open-source perfume database and community.
  developer: Redwan Rashid
  author: Redwan Rashid
  icon: https://raw.githubusercontent.com/Redwan99/Subash/main/public/favicon.ico
  thumbnail: https://raw.githubusercontent.com/Redwan99/Subash/main/public/og-image.png
  title:
    en_us: Subash
    custom: ""
  category: Web
  port_map: "9864"
